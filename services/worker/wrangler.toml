name = "openbrain-worker"
main = "src/app/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# Non-secret env vars go here. Secrets are set via: wrangler secret put <KEY>

[[r2_buckets]]
binding = "VAULT_BUCKET"
bucket_name = "openbrain-vault"

# Supabase connection is via SUPABASE_URL + SUPABASE_SERVICE_KEY secrets
# Telegram bot token is via TELEGRAM_BOT_TOKEN secret
# Auth bearer token is via OPENBRAIN_AUTH_TOKEN secret
